services:
  mongo:
    image: mongo:7
    container_name: sanun-jara-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - sanun_jara_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    image: node:20-alpine
    container_name: sanun-jara-api
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5050:5050"
    volumes:
      - ./server:/app
      - ./public/biographies:/biographies
      - sanun_jara_api_node_modules:/app/node_modules
    environment:
      PORT: 5050
      BIOGRAPHIES_DIR: /biographies
      MONGODB_URI: mongodb://mongo:27017/sanun_jara_elite
      JWT_SECRET: local_dev_secret_change_me
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin1234
      CORS_ORIGIN: http://localhost:8080,http://localhost:8081
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: sanun-jara-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - sanun_jara_frontend_node_modules:/app/node_modules
    environment:
      VITE_DEV_API_PROXY: http://api:5050
    depends_on:
      - api

volumes:
  sanun_jara_mongo_data:
  sanun_jara_api_node_modules:
  sanun_jara_frontend_node_modules:
